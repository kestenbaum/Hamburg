<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./dist/css/style.css" />
    <script src="src/scripts/index.js" defer></script>
    <title>Hamburg</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <a href="javascript:void(0)">
            <img class="header__logo header__icon" src="./src/assets/logo.svg" alt="header-logo" />
          </a>
          <nav class="header__nav">
            <img
              class="header__search header__icon"
              src="src/assets/search-logo.png"
              alt="search-logo"
            />
            <button class="burger" aria-label="Open menu">
              <span class="burger__line"></span>
            </button>
            <ul class="header__menu">
              <li class="header__menu-item">
                <a class="header__menu-link" href="">Home</a>
              </li>
              <li class="header__menu-item header__menu-item--dropdown">
                <input type="checkbox" id="culture-toggle" class="dropdown-toggle" />
                <label for="culture-toggle" class="header__menu-link">
                  Culture
                  <span class="arrow"></span>
                </label>
                <ul class="header__submenu">
                  <li class="header__menu-item">
                    <a class="header__menu-sublink" href="#">Kino</a>
                  </li>
                </ul>
              </li>
              <li class="header__menu-item header__menu-item--dropdown">
                <input type="checkbox" id="food-toggle" class="dropdown-toggle" />
                <label for="food-toggle" class="header__menu-link">
                  Food
                  <span class="arrow"></span>
                </label>
                <ul class="header__submenu">
                  <li class="header__menu-item">
                    <a class="header__menu-sublink" href="#">Pizza</a>
                  </li>
                </ul>
              </li>
              <li class="header__menu-item">
                <a class="header__menu-link" href="">Secret moments</a>
              </li>
              <li class="header__menu-item header__menu-item--daten">
                <a class="header__menu-link" href="">IMPRESSUM/ DATENSCHUTZ</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="container">
        <div class="hero__inner">
          <p class="hero__subtitle">Dein City Guide für</p>
          <div class="title__inner">
            <h1 class="hero__title title-main">Hamburg</h1>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="45"
              height="30"

              fill="none"

</html>
